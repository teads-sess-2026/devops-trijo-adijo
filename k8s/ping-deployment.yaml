apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping
  labels:
    app: ping
spec:
  replicas: 6
  selector:
    matchLabels:
      app: ping
  template:
    metadata:
      labels:
        app: ping
    spec:
      # Spread pods evenly across AZs (aim for 3 + 3). ScheduleAnyway keeps it a
      # *preference*: if a zone/node is lost, the pods are allowed to pile onto
      # the surviving zone instead of getting stuck Pending.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: ping
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: ping
          image: 937697200280.dkr.ecr.eu-west-1.amazonaws.com/trijo-adijo/ping:v2
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ping-admin
                  key: admin-token
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: PUBLIC_URL
              value: "http://a5119c57be7a54fdc9bc104052a284ef-1290957200.eu-west-1.elb.amazonaws.com"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ping
  labels:
    app: ping
spec:
  type: LoadBalancer
  selector:
    app: ping
  ports:
    - name: http
      port: 80
      targetPort: 8000