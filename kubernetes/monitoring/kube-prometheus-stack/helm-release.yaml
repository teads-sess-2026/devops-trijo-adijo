apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=60.0.0 <70.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
  values:
    grafana:
      enabled: true
    alertmanager:
      enabled: true
      alertmanagerSpec:
        # Mounts Secret "alertmanager-slack" at
        # /etc/alertmanager/secrets/alertmanager-slack/ so the config below can
        # read the webhook URL from a file (keeps the URL out of git).
        secrets:
          - alertmanager-slack
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: slack
          routes:
            # Watchdog fires constantly by design; keep it out of Slack.
            - matchers:
                - alertname = "Watchdog"
              receiver: "null"
        receivers:
          - name: "null"
          - name: slack
            slack_configs:
              - channel: "#alerts"
                send_resolved: true
                api_url_file: /etc/alertmanager/secrets/alertmanager-slack/webhook-url
                title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
                text: >-
                  {{ range .Alerts }}*{{ .Annotations.summary }}*
                  {{ .Annotations.description }}
                  {{ end }}
    prometheus:
      enabled: true
      prometheusSpec:
        # Adopt ServiceMonitors/PodMonitors in any namespace regardless of the
        # Helm release label, so our own ping ServiceMonitor is picked up.
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
